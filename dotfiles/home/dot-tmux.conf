if-shell '[ "$(whoami)" = "sd" ] && { [ "$(uname -n)" = "catfish" ] || [ "$(uname -n)" = "fennec" ] || [ "$(uname -n)" = "kitten" ] || [ "$(uname -n)" = "void" ]; }' \
  'unbind-key C-b; set-option -g prefix C-f; bind-key C-b send-prefix' \
  'set-option -g prefix C-b; bind-key C-b send-prefix'
set -g base-index 1

# Easy config reload
bind-key R source-file ~/.tmux.conf \; display-message "tmux.conf reloaded."

# vi is good
setw -g mode-keys vi

# mouse behavior
set -g mouse on

set-option -g default-terminal xterm-256color

bind-key : command-prompt
bind-key r refresh-client
bind-key L clear-history

bind-key space next-window
bind-key bspace previous-window
bind-key enter next-layout

# use vim-like keys for splits and windows
bind-key v split-window -h -c "#{pane_current_path}"
bind-key s split-window -v -c "#{pane_current_path}"
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind-key C-o rotate-window

bind-key + select-layout main-horizontal
bind-key = select-layout main-vertical
set-window-option -g other-pane-height 25
set-window-option -g other-pane-width 80

bind-key a last-pane
bind-key q display-panes
bind-key c new-window -c "#{pane_current_path}"
bind-key t next-window
bind-key T previous-window

bind-key [ copy-mode
bind-key ] paste-buffer

run-shell "tmux setenv -g TMUX_VERSION $(tmux -V | cut -c 6-)"

# Setup 'v' to begin selection as in Vim
# Update default binding of `Enter` to also use copy-pipe
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
unbind -T copy-mode-vi Enter
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "pbcopy"

set-window-option -g display-panes-time 1500

# Status Bar
set-option -g status-interval 1
set-option -g status-left ''
set-option -g status-right '%l:%M%p'
if-shell '[ "$(whoami)" = "sd" ] && { [ "$(uname -n)" = "catfish" ] || [ "$(uname -n)" = "fennec" ] || [ "$(uname -n)" = "kitten" ] || [ "$(uname -n)" = "void" ]; }' \
  'set-option -g status-style fg=brightwhite,bg=brightcyan; set-window-option -g window-status-current-style bg=cyan,fg=brightwhite; set-window-option -g window-status-activity-style bg=brightcyan,fg=brightyellow' \
  'set-option -g status-style fg=black,bg=gray;    set-window-option -g window-status-current-style bg=black,fg=white; set-window-option -g window-status-activity-style fg=black,bg=yellow'

set-option -g window-status-separator '  '

set -g automatic-rename-format \
  "#{pane_current_command}@#(ps -o user= -p $(pgrep -t $(echo pts/$(basename #{pane_tty}))))"
set -g automatic-rename on

# keep status bar tidy; #W now shows the new name
set -g window-status-format  "#I #W"
set -g window-status-current-format "#I #W"

set-option -g pane-active-border-style fg=white
set-option -g pane-border-style fg=white

# Set window notifications
setw -g monitor-activity on
set -g visual-activity on

# Allow the arrow key to be used immediately after changing windows
set-option -g repeat-time 0

# Fix to allow mousewheel/trackpad scrolling in tmux 2.1
bind-key -T root WheelUpPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; copy-mode -e; send-keys -M"
bind-key -T root WheelDownPane if-shell -F -t = "#{alternate_on}" "send-keys -M" "select-pane -t =; send-keys -M"

# Disable assume-paste-time, so that iTerm2's "Send Hex Codes" feature works
# with tmux 2.1. This is backwards-compatible with earlier versions of tmux,
# AFAICT.
set-option -g assume-paste-time 0

set-option -a terminal-features ',xterm-256color:RGB'
